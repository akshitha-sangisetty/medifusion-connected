services:
  - type: web
    name: medifusion-api
    env: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: medifusion-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.10.13

databases:
  - name: medifusion-db
    databaseName: medifusion
    user: medifusion_user
    plan: free
