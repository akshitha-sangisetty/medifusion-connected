<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Submit Symptoms – MediFusion Premium</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
/* PREMIUM DARK GLASSMORPHISM PALETTE */
:root {
    --bg-dark: #0F172A;
    --glass-bg: rgba(30, 41, 59, 0.7);
    --glass-border: rgba(255, 255, 255, 0.1);
    --accent-glow: #38BDF8;
    --accent-gradient: linear-gradient(135deg, #38BDF8, #818CF8);
    --text-primary: #F8FAFC;
    --text-secondary: #94A3B8;
}

body {
    margin: 0;
    padding: 0;
    font-family: 'Outfit', sans-serif;
    background: radial-gradient(circle at top left, #1E1B4B, var(--bg-dark));
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.wrapper {
    width: 90%;
    max-width: 900px;
    background: var(--glass-bg);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid var(--glass-border);
    border-radius: 24px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    display: flex;
    overflow: hidden;
}

.left {
    width: 45%;
    background: rgba(0,0,0,0.2);
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 40px;
}

.left img {
    width: 100%;
    max-width: 250px;
    animation: float 4s infinite ease-in-out;
    filter: drop-shadow(0 0 20px rgba(56, 189, 248, 0.4));
}

@keyframes float {
    0% { transform: translateY(0); }
    50% { transform: translateY(-15px); }
    100% { transform: translateY(0); }
}

.right {
    width: 55%;
    padding: 50px 40px;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

h2 {
    margin: 0;
    font-size: 32px;
    font-weight: 700;
    background: var(--accent-gradient);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 10px;
}

.subtitle {
    color: var(--text-secondary);
    font-size: 16px;
    margin-bottom: 30px;
    line-height: 1.5;
}

.input-box {
    width: 100%;
    padding: 15px 20px;
    background: rgba(0,0,0,0.2);
    border: 1px solid var(--glass-border);
    border-radius: 12px;
    color: var(--text-primary);
    font-size: 15px;
    font-family: 'Outfit', sans-serif;
    margin-bottom: 20px;
    box-sizing: border-box;
    transition: all 0.3s ease;
}

.input-box:focus {
    outline: none;
    border-color: var(--accent-glow);
    box-shadow: 0 0 15px rgba(56, 189, 248, 0.2);
    background: rgba(0,0,0,0.3);
}

.input-box::placeholder {
    color: var(--text-secondary);
    opacity: 0.7;
}

button {
    width: 100%;
    padding: 16px;
    background: var(--accent-gradient);
    border: none;
    border-radius: 12px;
    color: white;
    font-size: 16px;
    font-weight: 600;
    font-family: 'Outfit', sans-serif;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 4px 15px rgba(56, 189, 248, 0.4);
    letter-spacing: 0.5px;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(56, 189, 248, 0.6);
}

.btn-secondary {
    background: transparent;
    border: 1px solid var(--glass-border);
    color: var(--text-secondary);
    box-shadow: none;
    margin-top: 15px;
}

.btn-secondary:hover {
    background: rgba(255,255,255,0.05);
    border-color: var(--text-primary);
    color: var(--text-primary);
    box-shadow: none;
}

@media(max-width: 900px) {
    .wrapper { flex-direction: column; width: 95%; border-radius: 20px; }
    .left { width: 100%; padding: 30px; display: none; /* hide image on mobile */ }
    .right { width: 100%; padding: 30px; }
}
</style>
</head>
<body>

<div class="wrapper">
    <div class="left">
        <img src="https://cdn-icons-png.flaticon.com/512/2966/2966327.png" alt="Medical Icon">
    </div>

    <div class="right">
        <h2>Submit Symptoms</h2>
        <p class="subtitle">Securely share your health concerns. Our AI will analyze them, and a specialist will review your case.</p>

        <input id="symInput" class="input-box" placeholder="Main symptoms (e.g., severe headache, fever)" required>
        <textarea id="descInput" class="input-box" rows="4" placeholder="Detailed description: When did it start? What makes it better or worse? (Optional)"></textarea>

        <div id="submitMsg" style="display:none; margin-bottom:12px;"></div>

        <button id="submitBtn" onclick="submitCase()">Submit to AI &amp; Doctor</button>
        <button class="btn-secondary" onclick="window.location.href='patient_dashboard.html'">Cancel &amp; Return</button>
    </div>
</div>

<script src="api.js"></script>
<script src="patient.js"></script>

</body>
</html>
