<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patient Dashboard – MediFusion Premium</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<style>
/* PREMIUM DARK GLASSMORPHISM PALETTE */
:root {
    --bg-dark: #0F172A;
    --glass-bg: rgba(30, 41, 59, 0.7);
    --glass-border: rgba(255, 255, 255, 0.1);
    --accent-glow: #38BDF8;
    --accent-gradient: linear-gradient(135deg, #38BDF8, #818CF8);
    --text-primary: #F8FAFC;
    --text-secondary: #94A3B8;
    --success: #10B981;
    --danger: #EF4444;
}

body {
    margin: 0;
    padding: 0;
    font-family: 'Outfit', sans-serif;
    background: radial-gradient(circle at top left, #1E1B4B, var(--bg-dark));
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 40px 0;
}

.container {
    width: 90%;
    max-width: 1200px;
}

/* Header */
.header-glass {
    background: var(--glass-bg);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid var(--glass-border);
    border-radius: 24px;
    padding: 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 40px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
}

.profile-info {
    display: flex;
    align-items: center;
    gap: 25px;
}

.profile-avatar {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: var(--accent-gradient);
    padding: 3px;
    display: flex;
    justify-content: center;
    align-items: center;
}

.profile-avatar img {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    object-fit: cover;
    background: var(--bg-dark);
}

.profile-text h1 {
    margin: 0;
    font-size: 28px;
    font-weight: 700;
    background: var(--accent-gradient);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.profile-text p {
    margin: 5px 0 0;
    color: var(--text-secondary);
    font-size: 16px;
}

.actions {
    display: flex;
    gap: 15px;
}

.btn {
    padding: 12px 24px;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    border: none;
    font-family: 'Outfit', sans-serif;
}

.btn-primary {
    background: var(--accent-gradient);
    color: white;
    box-shadow: 0 4px 15px rgba(56, 189, 248, 0.4);
}
.btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(56, 189, 248, 0.6);
}

.btn-danger {
    background: rgba(239, 68, 68, 0.1);
    color: var(--danger);
    border: 1px solid rgba(239, 68, 68, 0.3);
}
.btn-danger:hover {
    background: var(--danger);
    color: white;
}

/* Grid Layout */
.dashboard-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 30px;
}

.glass-card {
    background: var(--glass-bg);
    backdrop-filter: blur(16px);
    border: 1px solid var(--glass-border);
    border-radius: 24px;
    padding: 30px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    transition: transform 0.3s;
}
.glass-card:hover {
    transform: translateY(-5px);
    border-color: rgba(56, 189, 248, 0.3);
}

.card-title {
    font-size: 20px;
    font-weight: 600;
    color: var(--text-primary);
    margin: 0 0 20px 0;
    display: flex;
    align-items: center;
    gap: 10px;
}

/* Chart Container */
.chart-container {
    width: 100%;
    height: 250px;
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Info List */
.info-list {
    display: flex;
    flex-direction: column;
    gap: 20px;
}

.info-item {
    background: rgba(0,0,0,0.2);
    border-radius: 12px;
    padding: 15px 20px;
    border-left: 4px solid var(--accent-glow);
}

.info-label {
    font-size: 13px;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 5px;
}

.info-value {
    font-size: 16px;
    color: var(--text-primary);
    font-weight: 500;
    line-height: 1.5;
}

/* Status Badge */
.status-badge {
    display: inline-block;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 14px;
    font-weight: 600;
    text-transform: uppercase;
}
.status-new { background: rgba(245, 158, 11, 0.2); color: #FCD34D; border: 1px solid rgba(245, 158, 11, 0.4); }
.status-predicted { background: rgba(56, 189, 248, 0.2); color: #7DD3FC; border: 1px solid rgba(56, 189, 248, 0.4); }
.status-reviewed { background: rgba(16, 185, 129, 0.2); color: #6EE7B7; border: 1px solid rgba(16, 185, 129, 0.4); }

.no-data {
    text-align: center;
    color: var(--text-secondary);
    padding: 40px 0;
    font-style: italic;
}

@media(max-width: 900px) {
    .dashboard-grid { grid-template-columns: 1fr; }
    .header-glass { flex-direction: column; gap: 20px; text-align: center; }
    .profile-info { flex-direction: column; }
}
</style>
</head>
<body>

<div class="container">
    <!-- Header -->
    <div class="header-glass">
        <div class="profile-info">
            <div class="profile-avatar">
                <img src="https://cdn-icons-png.flaticon.com/512/921/921347.png" alt="Patient">
            </div>
            <div class="profile-text">
                <h1>Patient Dashboard</h1>
                <p>Welcome back! Here is your health analysis overview.</p>
            </div>
        </div>
        <div class="actions">
            <button class="btn btn-primary" onclick="window.location.href='submit_symptoms.html'">Submit New Case</button>
            <button class="btn btn-danger" onclick="logout()">Logout</button>
        </div>
    </div>

    <!-- Live Update Toast -->
    <div id="liveToast" style="display:none; margin-bottom:20px; padding:16px 24px; background:rgba(16,185,129,0.15); border:1px solid rgba(16,185,129,0.4); border-radius:14px; color:#6EE7B7; font-size:15px; font-weight:600; animation: fadeIn 0.4s ease;">
        🔴 Live update received from your doctor!
    </div>

    <!-- Main Grid -->
    <div class="dashboard-grid">
        
        <!-- Case Details -->
        <div class="glass-card">
            <h3 class="card-title">🩺 Case Information</h3>
            <div class="info-list" id="caseInfoContainer">
                <div class="no-data">Loading your latest case...</div>
            </div>
        </div>

        <!-- AI Visualization -->
        <div class="glass-card">
            <h3 class="card-title">🤖 AI Analysis Confidence</h3>
            <div class="chart-container" id="chartWrapper">
                <div class="no-data" id="chartFallback">No AI data to visualize yet.</div>
                <canvas id="aiChart" style="display:none;"></canvas>
            </div>
        </div>

        <!-- Doctor's Review -->
        <div class="glass-card" style="grid-column: 1 / -1;">
            <h3 class="card-title">👨‍⚕️ Doctor's Final Review</h3>
            <div class="info-list" id="reviewContainer">
                <div class="no-data">Pending doctor review...</div>
            </div>
        </div>

    </div>
</div>

<script src="api.js"></script>
<script src="patient.js"></script>
</body>
</html>
