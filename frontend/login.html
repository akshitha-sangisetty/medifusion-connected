<!DOCTYPE html>
<html lang="en">
<head>python -m uvicorn app.main:app --reload
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediFusion - Login</title>
    <link rel="stylesheet" href="styles/auth.css">
</head>

<body>

<div class="auth-container">
    <div class="auth-card">

        <img src="assets/logo.png" class="logo" alt="MediFusion HealthCare">

        <h2 class="title">Welcome to MediFusion</h2>
        <p class="subtitle">Your health, our priority</p>

        <form id="loginForm" onsubmit="loginUser(event)">

            <input type="text" id="username" placeholder="Username" required>
            <input type="password" id="password" placeholder="Password" required>

            <select id="role" required style="padding:10px;border-radius:6px;border:1px solid #ccc;">
<option value="">Select Role</option>
<option value="patient">Patient</option>
<option value="doctor">Doctor</option>
<option value="lab">Lab Technician</option>
</select><br><br><button class="btn-primary" type="submit">Login</button>
        </form>

        <p class="switch-text">
            Don’t have an account? <a href="signup.html">Sign up</a>
        </p>

    </div>
</div>


<script src="api.js"></script>
<script>
document.getElementById("loginForm").addEventListener("submit", async function(e){
    e.preventDefault();

    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();
    const role = document.getElementById("role").value;

    const res = await apiLogin(username, password);

    if (!res.access_token) {
        alert("Login failed: " + (res.detail || "Invalid credentials"));
        return;
    }

    // Save user info
    localStorage.setItem("token", res.access_token);
    localStorage.setItem("role", res.role);
    localStorage.setItem("user_id", res.user_id);

    // Redirect based on role
    if (res.role === "doctor") window.location.href = "doctor_dashboard.html";
    else if (res.role === "lab") window.location.href = "lab_dashboard.html";
    else window.location.href = "patient_dashboard.html";
});


</script>
<script src="api.js"></script>
<script src="login.js"></script>


</body></html>
