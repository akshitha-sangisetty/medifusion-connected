<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MediFusion – Sign Up</title>
<meta name="description" content="Create your MediFusion account – AI-powered healthcare platform">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #060d1f;
  --glass: rgba(15, 23, 42, 0.85);
  --border: rgba(99, 179, 237, 0.18);
  --accent: #38BDF8;
  --accent2: #818CF8;
  --gradient: linear-gradient(135deg, #38BDF8, #818CF8);
  --text: #F1F5F9;
  --muted: #94A3B8;
  --danger: #F87171;
  --success: #34D399;
}

body {
  font-family: 'Outfit', sans-serif;
  min-height: 100vh;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

.bg-orbs { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
.orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.2;
  animation: orbFloat 12s ease-in-out infinite;
}
.orb1 { width: 500px; height: 500px; background: #A78BFA; top: -150px; right: -100px; }
.orb2 { width: 400px; height: 400px; background: #38BDF8; bottom: -100px; left: -100px; animation-delay: -6s; }
.orb3 { width: 300px; height: 300px; background: #F59E0B; top: 60%; right: 20%; animation-delay: -4s; opacity: 0.1; }

@keyframes orbFloat {
  0%, 100% { transform: translate(0, 0); }
  50% { transform: translate(30px, 20px); }
}

body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(99,179,237,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(99,179,237,0.03) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
  z-index: 0;
}

.page-wrap {
  position: relative;
  z-index: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  padding: 20px;
}

.auth-card {
  width: 100%;
  max-width: 480px;
  background: var(--glass);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-radius: 28px;
  border: 1px solid var(--border);
  padding: 50px 48px;
  box-shadow: 0 30px 80px rgba(0,0,0,0.6);
}

.card-top {
  text-align: center;
  margin-bottom: 36px;
}
.logo-icon { font-size: 52px; display: block; margin-bottom: 12px; animation: pulse 3s ease-in-out infinite; }
@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.08); }
}
.card-top h2 {
  font-size: 28px;
  font-weight: 800;
  background: var(--gradient);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 6px;
}
.card-top p { color: var(--muted); font-size: 15px; }

.form-group { margin-bottom: 16px; }
.form-label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 8px;
}
.form-input {
  width: 100%;
  padding: 14px 18px;
  background: rgba(0,0,0,0.25);
  border: 1px solid var(--border);
  border-radius: 12px;
  color: var(--text);
  font-size: 15px;
  font-family: 'Outfit', sans-serif;
  transition: all 0.3s;
}
.form-input:focus {
  outline: none;
  border-color: var(--accent2);
  box-shadow: 0 0 0 3px rgba(129,140,248,0.15);
  background: rgba(0,0,0,0.35);
}
.form-input::placeholder { color: #4B5563; }
select.form-input { cursor: pointer; }
select.form-input option { background: #1E293B; color: var(--text); }

.row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

.role-picker {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-top: 4px;
}
.role-option {
  display: none;
}
.role-option + label {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  padding: 14px 10px;
  background: rgba(0,0,0,0.2);
  border: 1px solid var(--border);
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.25s;
  font-size: 13px;
  color: var(--muted);
  text-align: center;
}
.role-option + label .role-emoji { font-size: 22px; }
.role-option:checked + label {
  background: rgba(129,140,248,0.15);
  border-color: var(--accent2);
  color: var(--text);
  box-shadow: 0 0 16px rgba(129,140,248,0.2);
}

.btn-signup {
  width: 100%;
  padding: 16px;
  background: var(--gradient);
  border: none;
  border-radius: 12px;
  color: white;
  font-size: 16px;
  font-weight: 700;
  font-family: 'Outfit', sans-serif;
  cursor: pointer;
  letter-spacing: 0.5px;
  box-shadow: 0 4px 24px rgba(129,140,248,0.4);
  transition: all 0.3s;
  margin-top: 8px;
  position: relative;
  overflow: hidden;
}
.btn-signup::after {
  content: '';
  position: absolute;
  inset: 0;
  background: rgba(255,255,255,0.15);
  transform: translateX(-100%);
  transition: transform 0.4s;
}
.btn-signup:hover::after { transform: translateX(100%); }
.btn-signup:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(129,140,248,0.5); }
.btn-signup:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

.error-box {
  margin-top: 14px;
  padding: 12px 16px;
  background: rgba(248,113,113,0.12);
  border: 1px solid rgba(248,113,113,0.3);
  border-radius: 10px;
  color: var(--danger);
  font-size: 14px;
  display: none;
}
.success-box {
  margin-top: 14px;
  padding: 12px 16px;
  background: rgba(52,211,153,0.12);
  border: 1px solid rgba(52,211,153,0.3);
  border-radius: 10px;
  color: var(--success);
  font-size: 14px;
  display: none;
}

.divider {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 24px 0;
}
.divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.divider span { color: var(--muted); font-size: 13px; }

.switch-link { text-align: center; font-size: 14px; color: var(--muted); }
.switch-link a { color: var(--accent); text-decoration: none; font-weight: 600; }
.switch-link a:hover { text-decoration: underline; }

.spinner {
  display: inline-block;
  width: 18px; height: 18px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: white;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  vertical-align: middle;
  margin-right: 8px;
}
@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 600px) {
  .auth-card { padding: 36px 24px; }
  .role-picker { grid-template-columns: repeat(3, 1fr); }
}
</style>
</head>
<body>
<div class="bg-orbs">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>

<div class="page-wrap">
  <div class="auth-card">
    <div class="card-top">
      <span class="logo-icon">🏥</span>
      <h2>Create Account</h2>
      <p>Join MediFusion – AI-powered healthcare</p>
    </div>

    <form id="signupForm" onsubmit="signupUser(event)">
      <div class="row-2">
        <div class="form-group">
          <label class="form-label" for="username">Username</label>
          <input id="username" type="text" class="form-input" placeholder="Choose username" required autocomplete="username">
        </div>
        <div class="form-group">
          <label class="form-label" for="full_name">Full Name</label>
          <input id="full_name" type="text" class="form-input" placeholder="Your full name" required>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input id="password" type="password" class="form-input" placeholder="Create a strong password" required autocomplete="new-password">
      </div>

      <div class="form-group">
        <label class="form-label">Select Your Role</label>
        <div class="role-picker">
          <div>
            <input type="radio" name="role" id="role_patient" value="patient" class="role-option" required>
            <label for="role_patient">
              <span class="role-emoji">🧑‍🦽</span>
              Patient
            </label>
          </div>
          <div>
            <input type="radio" name="role" id="role_doctor" value="doctor" class="role-option">
            <label for="role_doctor">
              <span class="role-emoji">👨‍⚕️</span>
              Doctor
            </label>
          </div>
          <div>
            <input type="radio" name="role" id="role_lab" value="lab" class="role-option">
            <label for="role_lab">
              <span class="role-emoji">🔬</span>
              Lab Tech
            </label>
          </div>
        </div>
      </div>

      <div id="signupError" class="error-box"></div>
      <div id="signupSuccess" class="success-box"></div>

      <button id="signupBtn" class="btn-signup" type="submit">Create My Account</button>
    </form>

    <div class="divider"><span>Already registered?</span></div>
    <div class="switch-link">
      Have an account? <a href="login.html">← Sign in here</a>
    </div>
  </div>
</div>

<script src="api.js"></script>
<script src="signup.js"></script>
</body>
</html>
